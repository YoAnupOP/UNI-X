<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mark: rounded square -->
  <rect width="48" height="48" rx="12" fill="#8B5CF6"/>
  <!-- U arc -->
  <path d="M13 12 L13 27 Q13 36 24 36 Q35 36 35 27 L35 12"
        fill="none" stroke="white" stroke-width="3.8" stroke-linecap="round"/>
  <!-- Slash -->
  <line x1="17" y1="15" x2="29" y2="28" stroke="white" stroke-width="3.8" stroke-linecap="round" opacity="0.65"/>
  <!-- Two nodes -->
  <circle cx="13" cy="11" r="2.8" fill="white"/>
  <circle cx="35" cy="11" r="2.8" fill="white"/>

  <!-- Wordmark: UNI -->
  <text x="60" y="33"
        font-family="'Syne', 'Inter', system-ui, sans-serif"
        font-weight="900"
        font-size="28"
        letter-spacing="-1.2"
        fill="#F4F4F5">UNI</text>

  <!-- Hyphen pill -->
  <rect x="112" y="19" width="10" height="5" rx="2.5" fill="#8B5CF6"/>

  <!-- X with underline -->
  <text x="125" y="33"
        font-family="'Syne', 'Inter', system-ui, sans-serif"
        font-weight="900"
        font-size="28"
        letter-spacing="-1.2"
        fill="#F4F4F5">X</text>
  <rect x="125" y="36" width="18" height="3.5" rx="1.75" fill="#8B5CF6"/>
</svg>
